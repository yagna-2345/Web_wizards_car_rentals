{% extends 'base.html' %}

{% block title %}Login - Web Wizards Car Rentals{% endblock %}

{% block content %}
<div class="container" style="display:flex; justify-content:center; align-items:center; padding: 80px 20px;">
    <div class="glass-card" style="width: 100%; max-width: 450px;">
        <h2 style="font-size:2rem; font-weight:700; margin-bottom:10px; text-align:center;">Welcome <span>Back</span></h2>
        <p style="color:var(--text-muted); text-align:center; margin-bottom:30px; font-size:0.95rem;">Enter your credentials to access your dashboard</p>
        
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px; height:46px;">
                <i class="fa-solid fa-sign-in-alt"></i> Login
            </button>
        </form>
        
        <div style="margin-top:25px; text-align:center; font-size:0.9rem; border-top:1px solid var(--border-color); padding-top:20px;">
            <p style="color:var(--text-muted);">Don't have an account? <a href="{% url 'register' %}" style="color:var(--primary); text-decoration:none; font-weight:600;">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}

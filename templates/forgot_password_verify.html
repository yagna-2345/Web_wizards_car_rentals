{% extends 'base.html' %}

{% block title %}Reset Password Verification - Web Wizards Car Rentals{% endblock %}

{% block content %}
<div class="container" style="display:flex; justify-content:center; align-items:center; padding: 60px 20px;">
    <div class="glass-card" style="width: 100%; max-width: 500px; text-align:center;">
        
        <div style="width:70px; height:70px; border-radius:50%; background:var(--primary-glow); border:1px solid var(--primary); display:flex; justify-content:center; align-items:center; margin:0 auto 25px;">
            <i class="fa-solid fa-unlock-keyhole fa-2x" style="color:white;"></i>
        </div>
        
        <h2 style="font-size:2rem; font-weight:700; margin-bottom:10px;">Reset <span>Password</span></h2>
        <p style="color:var(--text-muted); font-size:0.95rem; margin-bottom:20px; line-height:1.5;">
            We've sent a 6-digit password reset OTP code to: <br>
            <strong style="color:var(--text-main); font-size:1rem;">{{ reset_email }}</strong>
        </p>
        
        <form method="POST" action="{% url 'forgot_password_verify' %}" style="text-align:left; margin-top:25px;">
            {% csrf_token %}
            
            <div class="form-group" style="margin-bottom:20px;">
                <label for="otp" style="font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px; display:block; text-align:center;">Enter 6-Digit Code</label>
                <input type="text" id="otp" name="otp" class="form-control" placeholder="123456" maxlength="6" pattern="\d{6}" required autocomplete="one-time-code" 
                       style="font-size:1.8rem; font-weight:800; letter-spacing:10px; text-align:center; padding: 10px 0; height: 56px; border-color:var(--border-color-hover); background:rgba(255,255,255,0.02);">
            </div>

            <div class="form-group" style="margin-bottom:20px;">
                <label for="new_password"><i class="fa-solid fa-lock"></i> New Password</label>
                <input type="password" id="new_password" name="new_password" class="form-control" placeholder="Create new password" required 
                       style="background:rgba(255,255,255,0.02); height:46px;">
            </div>

            <div class="form-group" style="margin-bottom:25px;">
                <label for="password_confirm"><i class="fa-solid fa-lock"></i> Confirm New Password</label>
                <input type="password" id="password_confirm" name="password_confirm" class="form-control" placeholder="Repeat new password" required 
                       style="background:rgba(255,255,255,0.02); height:46px;">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; height:46px; display:flex; align-items:center; justify-content:center; gap:8px;">
                <i class="fa-solid fa-circle-check"></i> Reset Password
            </button>
        </form>

        <div style="margin-top:25px; border-top:1px solid var(--border-color); padding-top:20px; text-align:center; font-size:0.9rem;">
            <a href="{% url 'forgot_password' %}" style="color:var(--text-muted); text-decoration:none; font-weight:500;">
                <i class="fa-solid fa-arrow-left"></i> Request New Code
            </a>
        </div>
        
    </div>
</div>
{% endblock %}
